<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathNexus - Missão</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="badge">
            🚀 MISSÃO ATIVA
        </div>

        <h1>
            <span id="tituloMissao">Carregando...</span>
        </h1>

        <p class="subtitle" id="tipoMissao">
            Aguardando missão
        </p>

        <div class="area" style="margin-bottom:30px;">
            <strong>Pergunta</strong>
            <br><br>
            <span id="perguntaMissao">
                Nenhuma missão disponível.
            </span>
        </div>

        <div class="alternativas" id="alternativasMissao"></div>

        <input
            type="text"
            class="campo"
            id="respostaAluno"
            placeholder="Resposta selecionada"
            readonly
        >

        <button class="btn aluno" id="btnProxima" onclick="proximaQuestao()">
            ➡️ Próxima Questão
        </button>

    </div>

</div>

<script type="module" src="app.js"></script>

<script>
let indiceQuestao = 0;
let respostasAluno = [];

const missao = JSON.parse(localStorage.getItem("missaoAtual"));

function carregarQuestao() {
    if (!missao || !missao.questoes || missao.questoes.length === 0) {
        document.getElementById("tituloMissao").innerHTML = "Nenhuma missão";
        document.getElementById("perguntaMissao").innerHTML = "Nenhuma questão disponível.";
        return;
    }

    const questao = missao.questoes[indiceQuestao];

    document.getElementById("tituloMissao").innerHTML = missao.titulo;

    document.getElementById("tipoMissao").innerHTML =
        `Questão ${indiceQuestao + 1} de ${missao.questoes.length}`;

    document.getElementById("perguntaMissao").innerHTML = questao.pergunta;

    document.getElementById("alternativasMissao").innerHTML = `
        <button class="alternativa" onclick="selecionarResposta('${questao.A}', 'A')">A) ${questao.A}</button>
        <button class="alternativa" onclick="selecionarResposta('${questao.B}', 'B')">B) ${questao.B}</button>
        <button class="alternativa" onclick="selecionarResposta('${questao.C}', 'C')">C) ${questao.C}</button>
        <button class="alternativa" onclick="selecionarResposta('${questao.D}', 'D')">D) ${questao.D}</button>
    `;

    document.getElementById("respostaAluno").value = "";
    localStorage.removeItem("alternativaAtual");

    if (indiceQuestao === missao.questoes.length - 1) {
        document.getElementById("btnProxima").innerHTML = "✅ Finalizar Missão";
    } else {
        document.getElementById("btnProxima").innerHTML = "➡️ Próxima Questão";
    }
}

carregarQuestao();

window.proximaQuestao = function() {
    const resposta = document.getElementById("respostaAluno").value;
    const alternativa = localStorage.getItem("alternativaAtual");

    if (!resposta || !alternativa) {
        alert("Escolha uma resposta antes de continuar.");
        return;
    }

    respostasAluno.push({
        questao: indiceQuestao + 1,
        pergunta: missao.questoes[indiceQuestao].pergunta,
        resposta: resposta,
        alternativa: alternativa
    });

    indiceQuestao++;

    if (indiceQuestao >= missao.questoes.length) {
        localStorage.setItem("respostasMissao", JSON.stringify(respostasAluno));
        enviarResposta();
        return;
    }

    carregarQuestao();
}
</script>

</body>
</html>
