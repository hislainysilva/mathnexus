<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Missão - MathNexus</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="badge">
            🚀 NOVA MISSÃO
        </div>

        <h1>
            Criar<span>Atividade</span>
        </h1>

        <p class="subtitle">
            Configure o próximo desafio dos seus alunos.
        </p>

        <input
            type="text"
            class="campo"
            id="codigoMissao"
            placeholder="Código da missão"
            readonly
        >

        <button class="btn aluno" onclick="gerarCodigoMissao()">
            🔑 Gerar Código
        </button>

        <div class="area" id="codigoGerado" style="margin-top:20px;">
            Nenhum código gerado
        </div>

        <input
            type="text"
            class="campo"
            id="tituloMissaoCriar"
            placeholder="Título da missão"
        >

        <select class="campo" id="turmaMissaoCriar">
            <option>Selecione a turma</option>
            <option>6º Ano</option>
            <option>7º Ano</option>
            <option>8º Ano</option>
            <option>9º Ano</option>
        </select>

        <select class="campo" id="tipoMissaoCriar">
            <option>Tipo de atividade</option>
            <option>Múltipla escolha</option>
            <option>Resposta curta</option>
            <option>Verdadeiro ou falso</option>
            <option>Desafio matemático</option>
            <option>Prática experimental</option>
        </select>

        <div class="cardQuestao">

            <h2>Questão 1</h2>

            <textarea
                class="campo perguntaQuestao"
                id="perguntaPrincipal"
                rows="5"
                placeholder="Digite a pergunta ou descrição da atividade"
            ></textarea>

            <input
                type="text"
                class="campo altA"
                id="alternativaA"
                placeholder="Alternativa A"
            >

            <input
                type="text"
                class="campo altB"
                id="alternativaB"
                placeholder="Alternativa B"
            >

            <input
                type="text"
                class="campo altC"
                id="alternativaC"
                placeholder="Alternativa C"
            >

            <input
                type="text"
                class="campo altD"
                id="alternativaD"
                placeholder="Alternativa D"
            >

        </div>

        <div id="listaQuestoes"></div>

        <button class="btn aluno" onclick="adicionarQuestao()">
            ➕ Adicionar Questão
        </button>

        <button class="btn aluno" onclick="salvarMissao()">
            💾 Salvar Missão
        </button>

        <button class="btn professor" onclick="liberarMissao()">
            🚀 Liberar Missão
        </button>

    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
