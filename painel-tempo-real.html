<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathNexus Control</title>

<link rel="stylesheet" href="style.css">
<script type="module" src="app.js"></script>
</head>

<body>

<div class="background"></div>

<main class="dashboard">

    <section class="dashboard-header">
        <div>
            <div class="badge">📊 PAINEL AO VIVO</div>
            <h1>Math<span>Nexus</span> Control</h1>
            <p class="subtitle">Acompanhe as respostas dos alunos em tempo real.</p>
        </div>
    </section>

    <section class="painel-busca">
        <input
            class="campo"
            id="codigoPainel"
            placeholder="Digite o código da missão"
        >

        <button class="btn aluno" onclick="abrirPainel()">
            🚀 Abrir Painel
        </button>
    </section>

    <section class="cards-resumo">
        <div class="resumo-card">
            <span>👥</span>
            <p>Participantes</p>
            <strong id="totalParticipantes">0</strong>
        </div>

        <div class="resumo-card">
            <span>✅</span>
            <p>Respostas</p>
            <strong id="totalRespostas">0</strong>
        </div>

        <div class="resumo-card">
            <span>🚀</span>
            <p>Status</p>
            <strong>Ao vivo</strong>
        </div>
    </section>

    <section>
        <h2 class="secao-titulo">📡 Respostas recebidas</h2>

        <div id="painelRespostas" class="respostas-grid">
            <p class="subtitle">Digite o código da missão para iniciar o acompanhamento.</p>
        </div>
    </section>

</main>

</body>
</html>
