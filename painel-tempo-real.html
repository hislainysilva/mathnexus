<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel Professor</title>

    <link rel="stylesheet" href="style.css">

    <script
        type="module"
        src="app.js">
    </script>
</head>

<body>

<div class="container">

    <div class="badge">
        📊 PAINEL AO VIVO
    </div>

    <h1>
        Painel
        <span>Professor</span>
    </h1>

    <p class="subtitle">
        Acompanhamento em tempo real.
    </p>

    <input
        class="campo"
        id="codigoPainel"
        placeholder="Código da missão">

    <button
        class="btn"
        onclick="abrirPainel()">

        🚀 Abrir Painel

    </button>

    <div id="painelRespostas">

    </div>

</div>

</body>
</html>
