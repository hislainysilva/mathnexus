<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathNexus Control</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="badge">
            🚀 MATHNEXUS CONTROL
        </div>

        <h1>
            Painel<span>Professor</span>
        </h1>

        <p class="subtitle">
            Centro de comando das missões.
        </p>

        <div class="areas">

            <div class="area">
                👥
                <br>
                Alunos Online
                <br>
                <strong>0</strong>
            </div>

            <div class="area">
                ✅
                <br>
                Respostas
                <br>
                <strong>0</strong>
            </div>

            <div class="area">
                🏆
                <br>
                XP Total
                <br>
                <strong>0</strong>
            </div>

        </div>

        <div class="buttons">

            <button class="btn aluno">
                📚 Criar Atividade
            </button>

            <button class="btn professor">
                🚀 Liberar Missão
            </button>

        </div>

        <br>

        <div class="buttons">

            <button class="btn aluno">
                📊 Estatísticas
            </button>

            <button class="btn professor">
                🏆 Ranking
            </button>

        </div>

    </div>

</div>

</body>
</html>
