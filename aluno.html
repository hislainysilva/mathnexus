<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathNexus - Aluno</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="badge">
            👨‍🎓 Área do Aluno
        </div>

        <h1>
            Math<span>Nexus</span>
        </h1>

        <p class="subtitle">
            Prepare-se para sua próxima missão.
        </p>

        <input
            type="text"
            placeholder="Digite seu nome"
            class="campo"
        >

        <select class="campo">
            <option>Selecione sua turma</option>
            <option>6º Ano</option>
            <option>7º Ano</option>
            <option>8º Ano</option>
            <option>9º Ano</option>
        </select>
<input
    type="text"
    placeholder="Código da missão"
    class="campo"
>
        <h3 class="titulo">
            Escolha seu avatar
        </h3>

        <div class="avatares">

           <button class="avatar" onclick="selecionarAvatar(this)">😀</button>
<button class="avatar" onclick="selecionarAvatar(this)">🤖</button>
<button class="avatar" onclick="selecionarAvatar(this)">🚀</button>
<button class="avatar" onclick="selecionarAvatar(this)">🧮</button>
<button class="avatar" onclick="selecionarAvatar(this)">🔬</button>
<button class="avatar" onclick="selecionarAvatar(this)">👾</button>

        </div>

        <h3 class="titulo">
            Cor do perfil
        </h3>

        <div class="cores">

            <<div class="cor azul" onclick="selecionarCor(this)"></div>
<div class="cor vermelho" onclick="selecionarCor(this)"></div>
<div class="cor verde" onclick="selecionarCor(this)"></div>
<div class="cor amarelo" onclick="selecionarCor(this)"></div>

        </div>

        <button class="btn aluno" onclick="entrarAluno()">
    🚀 Entrar na Missão
</button>

    </div>

</div>
<script src="app.js"></script>
</body>
</html>
